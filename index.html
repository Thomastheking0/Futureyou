<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureYou — Career Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:    #0a0a12;
  --card:  rgba(255,255,255,0.05);
  --bdr:   rgba(255,255,255,0.10);
  --text:  #f0eeff;
  --muted: #9490b8;
  --a:     #7c5cfc;
  --b:     #fc5c7d;
  --c:     #43e8c8;
}
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 55% 45% at 15% 15%,rgba(124,92,252,.16) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 85%,rgba(252,92,125,.13) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 60% 40%,rgba(67,232,200,.07)  0%,transparent 55%);
}

/* ── LANG SWITCHER ── */
#lang-bar {
  position: fixed; top: 16px; right: 20px; z-index: 999;
  display: flex; gap: 6px; align-items: center;
}
.lang-btn {
  font-family:'Inter',sans-serif; font-size:11px; font-weight:600;
  letter-spacing:.5px; text-transform:uppercase;
  background:rgba(255,255,255,.07); border:1.5px solid var(--bdr);
  color:var(--muted); border-radius:100px; padding:5px 12px;
  cursor:pointer; transition:all .18s; white-space:nowrap;
}
.lang-btn:hover  { border-color:var(--a); color:var(--text); }
.lang-btn.active { background:rgba(124,92,252,.2); border-color:var(--a); color:var(--text); }

/* ── APP ── */
#app {
  position:relative; z-index:1; min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:32px 16px 56px;
}
.screen { display:none; width:100%; max-width:680px; flex-direction:column; align-items:center; }
.screen.active { display:flex; animation:up .4s ease both; }
@keyframes up { from{opacity:0;transform:translateY(18px);} to{opacity:1;transform:translateY(0);} }

.badge {
  font-size:10px; font-weight:600; letter-spacing:3px; text-transform:uppercase;
  color:var(--c); border:1px solid rgba(67,232,200,.35);
  padding:5px 16px; border-radius:100px; margin-bottom:22px;
}
.grad {
  background:linear-gradient(130deg,var(--a),var(--b) 50%,var(--c));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}

/* HERO */
#s-hero { min-height:100vh; justify-content:center; }
.h1 { font-family:'Syne',sans-serif; font-size:clamp(38px,7.5vw,68px); font-weight:800; line-height:1.0; text-align:center; margin-bottom:16px; }
.hsub { font-size:15px; color:var(--muted); text-align:center; max-width:400px; line-height:1.7; margin-bottom:34px; }
.pills { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:38px; }
.pill { width:100px; height:64px; object-fit:cover; border-radius:100px; border:2px solid var(--bdr); opacity:.8; transition:opacity .2s,transform .2s; }
.pill:hover { opacity:1; transform:scale(1.06); }
.btn-hero {
  font-family:'Inter',sans-serif; font-weight:600; font-size:15px;
  background:linear-gradient(135deg,var(--a),var(--b)); color:#fff; border:none;
  border-radius:100px; padding:16px 44px; cursor:pointer;
  box-shadow:0 0 40px rgba(124,92,252,.4); transition:transform .2s,box-shadow .2s;
}
.btn-hero:hover { transform:translateY(-2px) scale(1.03); box-shadow:0 0 60px rgba(124,92,252,.55); }

/* QUESTIONS */
#s-question { min-height:100vh; justify-content:center; }
.qprog { display:flex; align-items:center; gap:14px; width:100%; margin-bottom:26px; }
.qstep { font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
.qbw { flex:1; height:3px; background:var(--bdr); border-radius:4px; overflow:hidden; }
.qb { height:100%; background:linear-gradient(90deg,var(--a),var(--b)); border-radius:4px; transition:width .5s ease; }
.qcat { align-self:flex-start; font-size:10px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--c); margin-bottom:11px; }
.qimg { width:100%; height:175px; object-fit:cover; border-radius:16px; margin-bottom:20px; border:1px solid var(--bdr); }
.qtxt { font-family:'Syne',sans-serif; font-size:clamp(17px,3vw,23px); font-weight:700; line-height:1.3; text-align:center; margin-bottom:24px; max-width:560px; }
.qopts { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; margin-bottom:22px; }
@media(max-width:460px){ .qopts{grid-template-columns:1fr;} }
.opt {
  background:var(--card); border:1.5px solid var(--bdr); border-radius:14px;
  padding:13px 15px; cursor:pointer; text-align:left; color:var(--text);
  font-family:'Inter',sans-serif; display:flex; align-items:flex-start; gap:10px;
  transition:border-color .18s,transform .18s,background .18s; position:relative; overflow:hidden;
}
.opt::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(124,92,252,.10),rgba(252,92,125,.07)); opacity:0; transition:opacity .18s; }
.opt:hover  { border-color:var(--a); transform:translateY(-2px); }
.opt:hover::after { opacity:1; }
.opt.sel    { border-color:var(--a); background:rgba(124,92,252,.13); }
.opt.sel::after { opacity:1; }
.oe { font-size:19px; flex-shrink:0; margin-top:1px; }
.ol { font-size:13px; font-weight:500; }
.od { font-size:11px; color:var(--muted); margin-top:2px; }
.btn-next {
  font-family:'Inter',sans-serif; font-weight:600; font-size:14px;
  background:linear-gradient(135deg,var(--a),var(--b)); color:#fff; border:none;
  border-radius:100px; padding:14px 40px; cursor:pointer;
  opacity:.3; pointer-events:none; transition:opacity .2s,transform .2s,box-shadow .2s;
}
.btn-next.on { opacity:1; pointer-events:all; }
.btn-next.on:hover { transform:translateY(-2px); box-shadow:0 0 40px rgba(124,92,252,.4); }

/* LOADING */
#s-loading { min-height:100vh; justify-content:center; gap:16px; }
.orb { width:68px; height:68px; border-radius:50%; background:linear-gradient(135deg,var(--a),var(--b),var(--c)); animation:pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.18);opacity:.7;} }
.ltxt { font-size:16px; font-weight:500; color:var(--muted); }
.dots { display:flex; gap:7px; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--a); animation:bd 1.2s ease-in-out infinite; }
.dot:nth-child(2){ animation-delay:.2s; background:var(--b); }
.dot:nth-child(3){ animation-delay:.4s; background:var(--c); }
@keyframes bd { 0%,80%,100%{transform:scale(.6);opacity:.3;} 40%{transform:scale(1.2);opacity:1;} }

/* RESULTS */
#s-results { align-items:stretch; padding-top:8px; }
.rhead { text-align:center; margin-bottom:26px; }
.rhead h2 { font-family:'Syne',sans-serif; font-size:clamp(22px,4vw,34px); font-weight:800; margin-bottom:9px; }
.rhead p  { font-size:14px; color:var(--muted); line-height:1.7; max-width:400px; margin:0 auto; }
.clist { display:flex; flex-direction:column; gap:12px; width:100%; margin-bottom:20px; }
.cc {
  width:100%; display:flex; flex-direction:row;
  background:var(--card); border:1px solid var(--bdr); border-radius:16px;
  overflow:hidden; transition:transform .22s,border-color .22s; animation:up .5s ease both;
}
.cc:nth-child(2){ animation-delay:.07s; }
.cc:nth-child(3){ animation-delay:.14s; }
.cc:hover { transform:translateY(-3px); border-color:rgba(124,92,252,.38); }
.cc-bar  { width:4px; flex-shrink:0; }
.cc-img  { width:120px; flex-shrink:0; object-fit:cover; display:block; }
.cc-body { flex:1; min-width:0; padding:16px 18px; display:flex; flex-direction:column; gap:6px; }
.cc-rank { display:inline-block; font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:3px 10px; border-radius:100px; width:fit-content; }
.cc-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; line-height:1.2; }
.cc-desc  { font-size:12.5px; color:var(--muted); line-height:1.65; }
.cc-stats { display:flex; gap:6px; flex-wrap:wrap; margin-top:2px; }
.cc-stat  { flex:1; min-width:110px; background:rgba(255,255,255,.05); border:1px solid var(--bdr); border-radius:8px; padding:7px 11px; display:flex; flex-direction:column; gap:1px; }
.cc-sv { font-size:12px; font-weight:700; }
.cc-sl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
@media(max-width:480px){
  .cc{flex-direction:column;} .cc-bar{width:100%;height:4px;} .cc-img{width:100%;height:110px;}
}

/* EXPLORER */
.explorer { width:100%; background:var(--card); border:1px solid var(--bdr); border-radius:16px; padding:22px; margin-bottom:18px; position:relative; overflow:hidden; }
.explorer::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--a),var(--b),var(--c)); }
.ex-title { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; margin-bottom:5px; }
.ex-sub   { font-size:12.5px; color:var(--muted); line-height:1.6; margin-bottom:14px; }
.ex-row   { display:flex; gap:8px; }
.ex-in {
  flex:1; background:rgba(255,255,255,.07); border:1.5px solid var(--bdr);
  border-radius:10px; padding:11px 14px; color:var(--text);
  font-family:'Inter',sans-serif; font-size:14px; outline:none; transition:border-color .2s;
}
.ex-in::placeholder { color:var(--muted); }
.ex-in:focus { border-color:var(--a); }
.ex-btn {
  font-family:'Inter',sans-serif; font-weight:600; font-size:13px;
  background:linear-gradient(135deg,var(--a),var(--b)); color:#fff; border:none;
  border-radius:10px; padding:11px 20px; cursor:pointer; white-space:nowrap;
  transition:transform .18s,box-shadow .18s;
}
.ex-btn:hover { transform:translateY(-1px); box-shadow:0 0 26px rgba(124,92,252,.4); }
.ex-res { display:none; margin-top:18px; border-top:1px solid var(--bdr); padding-top:18px; }
.ex-res.show { display:block; animation:up .35s ease both; }
.er-head { display:flex; align-items:center; gap:11px; margin-bottom:5px; }
.er-emo  { font-size:30px; }
.er-name { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; }
.er-fld  { font-size:11px; color:var(--muted); margin-top:1px; }
.er-q    { font-size:13px; color:var(--c); font-style:italic; line-height:1.6; margin-bottom:14px; }
.er-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
@media(max-width:460px){ .er-grid{grid-template-columns:1fr;} }
.er-card { background:rgba(255,255,255,.04); border:1px solid var(--bdr); border-radius:11px; padding:12px 14px; }
.er-ct   { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
.er-card ul { padding-left:14px; }
.er-card li { font-size:12.5px; color:var(--muted); line-height:1.65; margin-bottom:2px; }
.er-none { font-size:13px; color:var(--muted); margin-top:12px; line-height:1.6; }
.btn-restart {
  font-family:'Inter',sans-serif; font-weight:600; font-size:13px;
  background:transparent; color:var(--muted); border:1.5px solid var(--bdr);
  border-radius:100px; padding:12px 32px; cursor:pointer; transition:all .2s; align-self:center;
}
.btn-restart:hover { border-color:var(--a); color:var(--text); }
</style>
</head>
<body>

<!-- LANGUAGE BAR -->
<div id="lang-bar">
  <button class="lang-btn active" onclick="setLang('en')">🇬🇧 EN</button>
  <button class="lang-btn" onclick="setLang('sv')">🇸🇪 SV</button>
  <button class="lang-btn" onclick="setLang('es')">🇪🇸 ES</button>
</div>

<div id="app">

<!-- HERO -->
<div class="screen active" id="s-hero">
  <div class="badge" id="hero-badge"></div>
  <h1 class="h1" id="hero-h1a"></h1>
  <p class="hsub" id="hero-sub"></p>
  <div class="pills">
    <img class="pill" src="https://images.unsplash.com/photo-1622253692010-333f2da6031d?w=220&q=80" alt="">
    <img class="pill" src="https://images.unsplash.com/photo-1582213782179-e0d53f98f2ca?w=220&q=80" alt="">
    <img class="pill" src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=220&q=80" alt="">
    <img class="pill" src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=220&q=80" alt="">
    <img class="pill" src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=220&q=80" alt="">
  </div>
  <button class="btn-hero" onclick="startQuiz()" id="hero-btn"></button>
</div>

<!-- QUESTION -->
<div class="screen" id="s-question">
  <div class="qprog">
    <span class="qstep" id="qstep"></span>
    <div class="qbw"><div class="qb" id="qb" style="width:0%"></div></div>
    <span class="qstep" id="qpct">0%</span>
  </div>
  <span class="qcat" id="qcat"></span>
  <img class="qimg" id="qimg" src="" alt="">
  <p class="qtxt" id="qtxt"></p>
  <div class="qopts" id="qopts"></div>
  <button class="btn-next" id="btn-next" onclick="nextQ()" id="btn-next-el"></button>
</div>

<!-- LOADING -->
<div class="screen" id="s-loading">
  <div class="orb"></div>
  <p class="ltxt" id="load-txt"></p>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<!-- RESULTS -->
<div class="screen" id="s-results">
  <div class="rhead">
    <div class="badge" style="display:inline-block" id="res-badge"></div>
    <h2 id="res-h2"></h2>
    <p id="res-sub"></p>
  </div>
  <div class="clist" id="clist"></div>
  <div class="explorer">
    <div class="ex-title" id="ex-title"></div>
    <div class="ex-sub" id="ex-sub"></div>
    <div class="ex-row">
      <input class="ex-in" id="ex-in" type="text" maxlength="60" onkeydown="if(event.key==='Enter') explore()">
      <button class="ex-btn" onclick="explore()" id="ex-btn-el"></button>
    </div>
    <div class="ex-res" id="ex-res"></div>
  </div>
  <button class="btn-restart" onclick="restart()" id="restart-btn"></button>
</div>

</div><!-- /app -->

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let lang = 'en';
let qIdx = 0, picked = null, scores = {};

/* ═══════════════════════════════════════════════════
   LANGUAGE SWITCHER
═══════════════════════════════════════════════════ */
function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  applyUI();
  // If on hero, just re-render static text. If mid-quiz, re-render question.
  const activeId = document.querySelector('.screen.active')?.id;
  if (activeId === 's-question') renderQ();
  if (activeId === 's-results') showResults(true);
}

function applyUI() {
  const t = UI[lang];
  document.getElementById('hero-badge').textContent = t.heroBadge;
  document.getElementById('hero-h1a').innerHTML = t.heroH1;
  document.getElementById('hero-sub').textContent = t.heroSub;
  document.getElementById('hero-btn').textContent = t.heroBtn;
  document.getElementById('load-txt').textContent = t.loadTxt;
  document.getElementById('res-badge').textContent = t.resBadge;
  document.getElementById('res-h2').innerHTML = t.resH2;
  document.getElementById('res-sub').textContent = t.resSub;
  document.getElementById('ex-title').textContent = t.exTitle;
  document.getElementById('ex-sub').textContent = t.exSub;
  document.getElementById('ex-in').placeholder = t.exPlaceholder;
  document.getElementById('ex-btn-el').textContent = t.exBtn;
  document.getElementById('restart-btn').textContent = t.restartBtn;
  document.getElementById('btn-next').textContent = t.continueBtn;
  // clear any explorer result since language changed
  document.getElementById('ex-res').className = 'ex-res';
  document.getElementById('ex-res').innerHTML = '';
}

/* ═══════════════════════════════════════════════════
   QUIZ LOGIC
═══════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  el.style.animation = 'none'; el.offsetHeight; el.style.animation = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startQuiz() {
  qIdx = 0; scores = {}; picked = null;
  renderQ(); showScreen('s-question');
}

function renderQ() {
  const t = UI[lang];
  const q = Qs[lang][qIdx];
  document.getElementById('qcat').textContent = q.cat;
  document.getElementById('qtxt').textContent = q.txt;
  document.getElementById('qimg').src = q.img;
  document.getElementById('qstep').textContent = t.questionOf(qIdx + 1, Qs[lang].length);
  const pct = Math.round(qIdx / Qs[lang].length * 100);
  document.getElementById('qb').style.width = pct + '%';
  document.getElementById('qpct').textContent = pct + '%';
  document.getElementById('btn-next').textContent = t.continueBtn;

  const grid = document.getElementById('qopts');
  grid.innerHTML = '';
  q.opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = `<span class="oe">${o.e}</span><div><div class="ol">${o.l}</div><div class="od">${o.d}</div></div>`;
    b.onclick = () => {
      picked = o.t;
      document.querySelectorAll('.opt').forEach(x => x.classList.remove('sel'));
      b.classList.add('sel');
      document.getElementById('btn-next').classList.add('on');
    };
    grid.appendChild(b);
  });
  picked = null;
  document.getElementById('btn-next').classList.remove('on');
}

function nextQ() {
  if (!picked) return;
  picked.forEach(tag => { scores[tag] = (scores[tag] || 0) + 1; });
  qIdx++;
  if (qIdx < Qs[lang].length) renderQ();
  else { showScreen('s-loading'); setTimeout(() => showResults(false), 2000); }
}

function showResults(rerender) {
  const t = UI[lang];
  const careers = Careers[lang];
  const ranked = careers.map(c => {
    let s = 0; c.tags.forEach(tag => { if (scores[tag]) s += scores[tag]; }); return { ...c, s };
  }).sort((a, b) => b.s - a.s);

  const top3 = ranked.slice(0, 3);
  const list = document.getElementById('clist');
  list.innerHTML = '';

  top3.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'cc';
    el.innerHTML = `
      <div class="cc-bar" style="background:${c.col}"></div>
      <img class="cc-img" src="${c.img}" alt="${c.t}" loading="lazy">
      <div class="cc-body">
        <span class="cc-rank" style="background:${c.col}20;color:${c.col};border:1px solid ${c.col}40">${t.matchLabels[i]}</span>
        <div class="cc-title">${c.t}</div>
        <div class="cc-desc">${c.desc}</div>
        <div class="cc-stats">
          <div class="cc-stat"><div class="cc-sv" style="color:${c.col}">${c.salary}</div><div class="cc-sl">${t.salaryLabel}</div></div>
          <div class="cc-stat"><div class="cc-sv" style="color:${c.col}">${c.outlook}</div><div class="cc-sl">${t.jobLabel}</div></div>
        </div>
      </div>`;
    list.appendChild(el);
  });

  if (!rerender) {
    document.getElementById('ex-res').className = 'ex-res';
    document.getElementById('ex-res').innerHTML = '';
    document.getElementById('ex-in').value = '';
    showScreen('s-results');
  }
}

function restart() { showScreen('s-hero'); }

/* ═══════════════════════════════════════════════════
   CAREER EXPLORER
═══════════════════════════════════════════════════ */
function explore() {
  const raw = document.getElementById('ex-in').value.trim().toLowerCase();
  if (!raw) return;

  const t = UI[lang];
  const box = document.getElementById('ex-res');
  const kb = KB[lang];

  const match = kb.find(entry => entry.keys.some(k => raw.includes(k) || k.includes(raw)));

  if (!match) {
    box.innerHTML = `<p class="er-none">${t.erNone(raw)}</p>`;
    box.className = 'ex-res show';
    return;
  }

  const ul = arr => `<ul>${arr.map(x => `<li>${x}</li>`).join('')}</ul>`;
  const displayName = match.keys[0].split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

  box.innerHTML = `
    <div class="er-head">
      <div class="er-emo">${match.emoji}</div>
      <div>
        <div class="er-name">${displayName}</div>
        <div class="er-fld">${match.field}</div>
      </div>
    </div>
    <p class="er-q">"${match.quote}"</p>
    <div class="er-grid">
      <div class="er-card"><div class="er-ct" style="color:var(--a)">${t.erPersonality}</div>${ul(match.personality)}</div>
      <div class="er-card"><div class="er-ct" style="color:var(--b)">${t.erInterests}</div>${ul(match.interests)}</div>
      <div class="er-card"><div class="er-ct" style="color:var(--c)">${t.erLike}</div>${ul(match.like)}</div>
      <div class="er-card"><div class="er-ct" style="color:#ffd166">${t.erNeed}</div>${ul(match.need)}</div>
    </div>`;
  box.className = 'ex-res show';
  setTimeout(() => box.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

// Init UI on load
applyUI();
</script>
